<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar Studio</title>
    <link rel="stylesheet" href="unified.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <!-- html2canvas for PNG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Quill.js for rich text editing -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <!-- AG Grid for Excel editing -->
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
</head>
<body>
    <!-- App Container -->
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-left">
                <h1>📡 Radar Studio</h1>
                <span id="active-project-name" class="project-name">No project selected</span>
            </div>
            <div class="header-right">
                <button id="view-mode-btn" class="mode-btn active">👁️ View</button>
                <button id="edit-mode-btn" class="mode-btn">✏️ Edit</button>
                <button id="save-btn" class="save-btn" style="display:none;">💾 Save</button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Projects</h2>
                <button id="new-project-btn" class="new-btn">+ New</button>
            </div>
            <div id="project-list" class="project-list">
                <div class="loading">Loading projects...</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Radar View -->
            <div id="radar-view" class="radar-view">
                <div class="radar-controls">
                    <input type="text" id="search" placeholder="🔍 Search entries..." />
                    <button id="export-png" class="export-btn" title="Export as PNG">📷 Export PNG</button>
                </div>
                <svg id="radar"></svg>
                <div id="tooltip" class="tooltip hidden"></div>
            </div>
            
            <!-- Edit View (shown in edit mode) -->
            <div id="edit-view-main" class="edit-view-main" style="display:none;">
                <div class="edit-toolbar">
                    <h2>📊 Edit Excel Data</h2>
                    <div class="edit-actions">
                        <button id="rename-project-btn" class="action-btn">✏️ Rename Project</button>
                        <button id="add-row-btn" class="action-btn">➕ Add Row</button>
                        <button id="delete-row-btn" class="action-btn">🗑️ Delete Row</button>
                        <button id="refresh-grid-btn" class="action-btn">🔄 Refresh</button>
                    </div>
                </div>
                <div id="grid-container" class="ag-theme-alpine"></div>
            </div>
        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <!-- Detail View -->
            <div id="detail-view" class="detail-view">
                <button id="close-detail" class="close-btn">×</button>
                
                <!-- View Mode -->
                <div id="detail-view-mode">
                    <div class="detail-header">
                        <h2 id="detail-name"></h2>
                        <button id="edit-entry-btn" class="edit-btn">✏️ Edit</button>
                    </div>
                    
                    <div class="detail-section">
                        <h3>Classification</h3>
                        <div class="detail-meta">
                            <span id="detail-ring" class="badge"></span>
                            <span id="detail-quadrant" class="badge"></span>
                            <span id="detail-status" class="badge"></span>
                        </div>
                    </div>
                    
                    <div class="detail-section" id="detail-tags-section" style="display:none;">
                        <h3>Tags</h3>
                        <div id="detail-tags" class="detail-tags"></div>
                    </div>
                    
                    <div class="detail-section">
                        <h3>Description</h3>
                        <div id="detail-description" class="detail-description"></div>
                    </div>
                    
                    <div class="detail-section" id="detail-link-section" style="display:none;">
                        <h3>Link</h3>
                        <a id="detail-link" class="detail-link" target="_blank" rel="noopener noreferrer"></a>
                    </div>
                </div>
                
                <!-- Edit Mode -->
                <div id="detail-edit-mode" style="display:none;">
                    <h2>Edit Entry</h2>
                    <form id="edit-entry-form" class="edit-form">
                        <div class="form-group">
                            <label for="edit-name">Name *</label>
                            <input type="text" id="edit-name" required />
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-ring">Ring *</label>
                            <select id="edit-ring" required>
                                <option value="">-- Select Ring --</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-quadrant">Quadrant *</label>
                            <select id="edit-quadrant" required>
                                <option value="">-- Select Quadrant --</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-status">Status</label>
                            <select id="edit-status">
                                <option value="">-- Select Status --</option>
                            </select>
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-tags">Tags (comma-separated)</label>
                            <input type="text" id="edit-tags" placeholder="tag1, tag2, tag3" />
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-description">Description (HTML allowed)</label>
                            <div id="edit-description-editor" style="background: white; min-height: 200px;"></div>
                            <input type="hidden" id="edit-description" />
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-link-name">Link Name (optional)</label>
                            <input type="text" id="edit-link-name" placeholder="e.g., Documentation, GitHub, Website" />
                        </div>
                        
                        <div class="form-group">
                            <label for="edit-link">Link URL</label>
                            <input type="url" id="edit-link" placeholder="https://..." />
                        </div>
                        
                        <div class="form-actions">
                            <button type="submit" class="primary-btn">💾 Save</button>
                            <button type="button" id="cancel-edit-btn" class="secondary-btn">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </aside>
    </div>

    <!-- New Project Modal -->
    <div id="new-project-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Create New Radar</h2>
            <input type="text" id="new-project-name" placeholder="Project name..." />
            <div class="modal-actions">
                <button id="create-project-btn" class="primary-btn">Create</button>
                <button id="cancel-project-btn" class="secondary-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="unified.js"></script>
</body>
</html>
