title: "Sales & Opportunity Strategy Radar"
subtitle: "Q1 2026"

# Time-based rings (innermost to outermost)
rings:
  - id: current-hy
    name: "Current HY"
    order: 0
    color: "#4CAF50"  # Green
    description: "Current Half Year"
  
  - id: next-hy
    name: "Next HY"
    order: 1
    color: "#2196F3"  # Blue
    description: "Next Half Year"
  
  - id: year-plus-1
    name: "Year +1"
    order: 2
    color: "#FF9800"  # Orange
    description: "One year out"
  
  - id: year-plus-2
    name: "Year +2"
    order: 3
    color: "#9E9E9E"  # Gray
    description: "Two years out"

# Quadrants (customize these for your use case)
# Examples: Customer segments, Solution types, Business units, Regions
quadrants:
  - id: infrastructure
    name: "Infrastructure"
    description: "Infrastructure and platform solutions"
  
  - id: applications
    name: "Applications"
    description: "Application and software solutions"
  
  - id: services
    name: "Services"
    description: "Professional and managed services"
  
  - id: emerging
    name: "Emerging Tech"
    description: "Emerging technologies and innovations"

# Status values with colors (customize as needed)
# These map to the 'status' column in Excel
statuses:
  - id: on-track
    name: "On Track"
    color: "#4CAF50"  # Green
    description: "Progressing as planned"
  
  - id: at-risk
    name: "At Risk"
    color: "#FFC107"  # Yellow
    description: "Needs attention"
  
  - id: blocked
    name: "Blocked"
    color: "#F44336"  # Red
    description: "Critical issues"
  
  - id: new
    name: "New"
    color: "#E91E63"  # Magenta/Pink
    description: "Recently added"
  
  - id: moved-in
    name: "Moved In"
    color: "#4CAF50"  # Green
    description: "Moved to inner ring"
  
  - id: moved-out
    name: "Moved Out"
    color: "#FF5722"  # Deep Orange
    description: "Moved to outer ring"

# Deal size categories (for sizing dots)
dealSizes:
  - id: small
    name: "< $100k"
    value: 1
    description: "Small deals under $100k"
  
  - id: medium
    name: "$100k - $500k"
    value: 2
    description: "Medium deals $100k to $500k"
  
  - id: large
    name: "> $500k"
    value: 3
    description: "Large deals over $500k"

# Propensity to win categories (for coloring dots)
propensityToWin:
  - id: low
    name: "Low"
    color: "#F44336"  # Red
    description: "Low propensity to win"
  
  - id: medium
    name: "Medium"
    color: "#FFC107"  # Yellow
    description: "Medium propensity to win"
  
  - id: high
    name: "High"
    color: "#4CAF50"  # Green
    description: "High propensity to win"

# Layout configuration
layout:
  startAngleDeg: 0        # 0° at right; clockwise
  padding: 20             # px between rings
  jitter: 0.85            # 0..1 random jitter factor inside sectors
  minRadius: 80           # minimum radius for innermost ring
  maxRadius: 400          # maximum radius for outermost ring
  dotMinSize: 8           # minimum dot size
  dotMaxSize: 40          # maximum dot size (based on value/importance)

# Optional: Excel column mappings (if your columns have different names)
columnMappings:
  name: "name"
  ring: "ring"
  quadrant: "quadrant"
  isNew: "isNew"
  status: "status"
  description: "description"
  tags: "tags"
  link: "link"
  customer: "customer"      # optional
  value: "value"            # optional (for sizing dots)
  owner: "owner"            # optional
  dealSize: "dealSize"      # optional (deal size category)
  propensityToWin: "propensityToWin"  # optional (propensity to win - controls dot color)

