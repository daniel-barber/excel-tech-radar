name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v0.1.0
  workflow_dispatch:  # Allow manual trigger
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  build-macos:
    name: Build macOS Application
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      
      - name: Build macOS app
        run: |
          pyinstaller excel-radar.spec --clean --noconfirm
      
      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          
          DMG_NAME="RadarStudio-${VERSION}-macOS.dmg"
          
          mkdir -p dist/dmg
          cp -r "dist/Radar Studio.app" dist/dmg/
          
          hdiutil create -volname "Radar Studio" \
                         -srcfolder dist/dmg \
                         -ov -format UDZO \
                         "dist/$DMG_NAME"
          
          rm -rf dist/dmg
          
          echo "DMG_PATH=dist/$DMG_NAME" >> $GITHUB_ENV
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV
      
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/Radar Studio.app
          retention-days: 30
      
      - name: Upload DMG to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.DMG_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows Application
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[build]"
      
      - name: Build Windows exe
        run: |
          pyinstaller excel-radar.spec --clean --noconfirm
      
      - name: Create ZIP archive
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -match 'refs/tags/v(.*)') {
            $VERSION = $matches[1]
          } else {
            $VERSION = "${{ github.event.inputs.version }}"
          }
          
          $ZIP_NAME = "RadarStudio-$VERSION-Windows.zip"
          
          Compress-Archive -Path "dist\RadarStudio.exe", "README.md" -DestinationPath "dist\$ZIP_NAME"
          
          echo "ZIP_PATH=dist\$ZIP_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "ZIP_NAME=$ZIP_NAME" | Out-File -FilePath $env:GITHUB_ENV -Append
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.zip
            dist/*.exe
          retention-days: 30
      
      - name: Upload ZIP to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Create release notes
        run: |
          cat > release-notes.md << 'EOF'
          # Radar Studio v${{ steps.version.outputs.version }}
          
          ## Downloads
          
          ### macOS
          - **RadarStudio-${{ steps.version.outputs.version }}-macOS.dmg** - macOS installer
          - Requires macOS 10.13 or later
          
          ### Windows
          - **RadarStudio-${{ steps.version.outputs.version }}-Windows.zip** - Windows portable executable
          - Requires Windows 10 or later
          
          ## Installation
          
          ### macOS Installation
          
          1. Download the DMG file
          2. Open the DMG
          3. Drag "Radar Studio" to Applications folder
          4. **Important - First Launch:**
             - **Right-click** on "Radar Studio" in Applications
             - Select **"Open"** from the menu
             - Click **"Open"** in the security dialog
             - This is only needed the first time
          
          **Why this step?** macOS shows a security warning because the app is not signed with an Apple Developer certificate. The app is safe - this is just Apple's way of protecting users from unverified developers.
          
          **Alternative method (Terminal):**
          ```bash
          xattr -d com.apple.quarantine "/Applications/Radar Studio.app"
          ```
          
          ### Windows Installation
          
          1. Download the ZIP file
          2. Extract to a folder (e.g., `C:\Program Files\RadarStudio`)
          3. Run `RadarStudio.exe`
          4. **If Windows Defender shows a warning:**
             - Click "More info"
             - Click "Run anyway"
             - This is normal for unsigned applications
          
          ## Usage
          
          1. Launch the application
          2. Click "Browse" to select your data directory
          3. Click "Launch Radar" to start the server
          4. Your browser will open automatically to http://localhost:5050
          
          ## What's New
          
          - Initial standalone release
          - GUI launcher with directory picker
          - No Python installation required
          - Self-contained executables for Mac and Windows
          
          ## Known Issues
          
          - First launch may be slow as the app extracts bundled files
          - macOS may require security approval for unsigned apps
          - Windows Defender may flag the executable (false positive)
          
          ## Support
          
          For issues, please visit: https://github.com/yourusername/excel-tech-radar/issues
          EOF
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

